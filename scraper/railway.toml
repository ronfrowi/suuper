[build]
builder = "nixpacks"
buildCommand = "npm install --include=dev && npm run build"

[deploy]
startCommand = "npx playwright install --with-deps chromium && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "suuper-scraper"

[services.variables]
TZ = "America/Costa_Rica"
NODE_ENV = "production"
# Set SCRAPER_API_SECRET in the Railway dashboard — do not commit the real value here
